name: Release

# plugin.json 的 version bump 進 main 時,自動打 tag + 建 GitHub Release,
# 讓使用者能以 /plugin marketplace add teana0953/dev-loop#vX.Y.Z pin 版本。
on:
  push:
    branches: [main]
    paths:
      - "plugins/dev-loop/.claude-plugin/plugin.json"

jobs:
  tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 變更清單需要完整歷史與既有 tags

      - name: Read plugin version
        id: v
        run: |
          version=$(python3 -c "import json; print(json.load(open('plugins/dev-loop/.claude-plugin/plugin.json'))['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag + release if version is new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v${{ steps.v.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1 || gh release view "$tag" >/dev/null 2>&1; then
            echo "tag/release $tag already exists; nothing to do"
            exit 0
          fi
          # 變更清單從 commit log 生成(repo 走直接 commit 不開 PR,
          # gh 的 --generate-notes 以 PR 為單位、在此只會產出 compare 連結,故不用)。
          prev=$(git describe --tags --abbrev=0 2>/dev/null || true)
          {
            echo "dev-loop plugin $tag"
            echo
            echo "安裝:"
            echo "    /plugin marketplace add teana0953/dev-loop#$tag"
            echo "    /plugin install dev-loop@dev-loop"
            echo
            echo "或裝最新:/plugin marketplace add teana0953/dev-loop"
            echo
            echo "## 變更"
            git log --oneline --no-merges ${prev:+$prev..}HEAD | sed 's/^/- /'
            if [ -n "$prev" ]; then
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${tag}"
            fi
          } > /tmp/release-notes.md
          gh release create "$tag" \
            --title "$tag" \
            --notes-file /tmp/release-notes.md
